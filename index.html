<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Tower V2</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root {
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --dark:#0f172a;
  --accent:#1e293b;
}

body {
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap {
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.header {
  background:linear-gradient(135deg,#0f172a,#334155);
  color:white;
  padding:30px;
  border-radius:20px;
}

.header h1 {
  margin:0;
  font-size:42px;
}

.header p {
  margin-top:10px;
  opacity:0.8;
}

.btn {
  margin-top:15px;
  padding:12px 18px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  margin-right:10px;
}

.primary { background:white; }
.secondary { background:#475569;color:white; }

.kpis {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  margin-top:20px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.label {
  color:var(--muted);
  font-size:13px;
}

.value {
  font-size:28px;
  font-weight:bold;
  margin-top:5px;
}

.grid {
  display:grid;
  grid-template-columns:1.3fr 1fr;
  gap:20px;
  margin-top:20px;
}

input {
  padding:10px;
  width:100%;
  margin-bottom:10px;
}

.tag {
  display:inline-block;
  padding:6px 10px;
  border-radius:20px;
  margin-right:5px;
  margin-top:5px;
  cursor:pointer;
  border:1px solid #ddd;
}

.activeTag {
  background:#0f172a;
  color:white;
}

.factory {
  padding:10px;
  border-bottom:1px solid #eee;
}

</style>
</head>

<body>
<div class="wrap">

<div class="header">
  <h1>Control Tower V2</h1>
  <p>Executive visibility across sourcing network</p>

  <button class="btn primary" onclick="loadData()">Open live CSV</button>
</div>

<div class="kpis">
  <div class="card"><div class="label">Factories</div><div class="value" id="kpiFactories">0</div></div>
  <div class="card"><div class="label">Active</div><div class="value" id="kpiActive">0</div></div>
  <div class="card"><div class="label">High Risk</div><div class="value" id="kpiRisk">0</div></div>
  <div class="card"><div class="label">At Risk Capacity</div><div class="value" id="kpiCapacity">0</div></div>
  <div class="card"><div class="label">Top Supplier %</div><div class="value" id="kpiTop">0%</div></div>
</div>

<div class="grid">

<div class="card">
  <h3>Control filters</h3>
  <input id="search" placeholder="Search..." oninput="render()"/>

  <div>
    <span class="tag activeTag" onclick="setRisk('all')">All</span>
    <span class="tag" onclick="setRisk('high')">High risk</span>
    <span class="tag" onclick="setRisk('medium')">Medium</span>
    <span class="tag" onclick="setRisk('low')">Low</span>
  </div>

  <div id="list"></div>
</div>

<div class="card">
  <h3>Decision panel</h3>
  <p id="decision"></p>
</div>

</div>

</div>

<script>
const DATA_URL = "data/factory_master.csv";

let rows = [];
let filterRisk = "all";

function loadData(){
  Papa.parse(DATA_URL,{
    download:true,
    header:true,
    skipEmptyLines:true,
    complete:(res)=>{
      rows = res.data.map(r=>({
        name:r.name,
        country:r.country,
        capacity:Number(r.capacity)||0,
        status:(r.status||"").toLowerCase()
      }));

      updateKPIs();
      render();
    }
  });
}

function riskLevel(r){
  if(r.status.includes("inactive")) return "high";
  if(r.capacity < 50000) return "medium";
  return "low";
}

function updateKPIs(){
  document.getElementById("kpiFactories").textContent = rows.length;

  const active = rows.filter(r=>r.status.includes("active")).length;
  document.getElementById("kpiActive").textContent = active;

  const high = rows.filter(r=>riskLevel(r)=="high").length;
  document.getElementById("kpiRisk").textContent = high;

  const cap = rows
    .filter(r=>riskLevel(r)=="high")
    .reduce((a,b)=>a+b.capacity,0);

  document.getElementById("kpiCapacity").textContent = cap.toLocaleString();

  const total = rows.reduce((a,b)=>a+b.capacity,0);
  const top = rows.sort((a,b)=>b.capacity-a.capacity)[0];

  const pct = top ? Math.round((top.capacity/total)*100) : 0;
  document.getElementById("kpiTop").textContent = pct + "%";
}

function render(){
  const search = document.getElementById("search").value.toLowerCase();

  let filtered = rows.filter(r =>
    r.name.toLowerCase().includes(search) &&
    (filterRisk=="all" || riskLevel(r)==filterRisk)
  );

  document.getElementById("list").innerHTML =
    filtered.map(f=>`
      <div class="factory">
        ${f.name} | ${f.country} | ${f.capacity}
      </div>
    `).join("");

  document.getElementById("decision").textContent =
    filtered.length + " factories match filters";
}

function setRisk(r){
  filterRisk = r;

  document.querySelectorAll(".tag").forEach(t=>t.classList.remove("activeTag"));
  event.target.classList.add("activeTag");

  render();
}

loadData();
</script>

</body>
</html>
